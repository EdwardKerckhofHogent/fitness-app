query me {
  me {
    user {
      id
      email
      routines {
        id
        userId
        name
        exercises {
          routineId
          name
          sets {
            exerciseId
            kg
            reps
          }
        }
      }
    }
    errors {
      path
      message
    }
  }
}

query getRoutines {
  getRoutines {
    routines {
      name
      userId
      exercises {
        name
        routineId
        sets {
          exerciseId
          kg
          reps
        }
      }
    }
    errors {
      message
    }
  }
}
